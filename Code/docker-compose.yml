services:
  bookorbit-api:
    container_name: bookorbit-api
    build:
        context: .
        dockerfile: Dockerfile
        target: final
    ports:
      - "7240:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=BookOrbitDb;User=sa;Password=MyStrongPass123!;TrustServerCertificate=True;MultipleActiveResultSets=True
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    depends_on:
      - sqlserver
      - seq
      - jaeger 
    networks:
    - bookorbit-net
    restart: on-failure

  sqlserver:
    container_name: bookorbit-sql
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=MyStrongPass123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - bookorbit-net
    restart: always


  seq:
   image: datalust/seq:latest
   container_name: seq
   volumes:
    - ./containers/seq:/data
   environment:
     - ACCEPT_EULA=Y
     - SEQ_FIRSTRUN_NOAUTHENTICATION=true
     - SEQ_FIRSTRUN_ADMINPASSWORD=MyStrongPass123!
   networks:
     - bookorbit-net
   ports:
     - "5341:5341"
     - "8081:80"
   restart: unless-stopped


  prometheus:
   image: prom/prometheus:latest
   container_name: prometheus
   volumes:
     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
   ports:
     - "9090:9090"
   networks:
     - bookorbit-net
   depends_on:
     - bookorbit-api
   restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=sa123456
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - bookorbit-net
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped


  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - bookorbit-net
    
networks:
  bookorbit-net:
    driver: bridge

volumes:
  grafana-data:
  sqlserver-data: